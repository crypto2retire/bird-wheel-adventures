<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0" />
  <meta name="theme-color" content="#7BA598" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="Bird & Wheel Adventures" />
  <meta name="description" content="Fun educational games for kids who love birds and vehicles!" />
  <title>Bird & Wheel Adventures</title>
  <link rel="manifest" href="/manifest.json" />
  <link rel="apple-touch-icon" href="/assets/icons/icon-192x192.svg" />
  <link rel="icon" type="image/svg+xml" href="/assets/icons/icon-192x192.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/src/main.css" />
</head>
<body>
  <div id="app" class="game-container">
    <header id="game-header" class="game-header">
      <button id="back-btn" class="nav-btn hidden" aria-label="Go back" style="gap:4px;padding:0 12px;font-size:0.9rem;font-weight:700;">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M15 18l-6-6 6-6"/>
        </svg>
        <span>Home</span>
      </button>
      <h1 id="game-title" class="game-title">Bird & Wheel Adventures</h1>
      <button id="settings-btn" class="nav-btn hidden" aria-label="Settings">
        <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="3"/>
          <path d="M12 1v6m0 6v6m4.22-10.22l4.24-4.24M6.34 6.34L2.1 2.1m17.9 10h-6m-6 0H1.9m15.32 4.22l4.24 4.24M6.34 17.66l-4.24 4.24"/>
        </svg>
      </button>
    </header>
    <main id="game-screen" class="game-screen">
      <!-- Dynamic content loaded here -->
    </main>
    <div id="settings-panel" class="settings-panel hidden">
      <div class="settings-content">
        <h2>Parent Settings</h2>
        <div class="setting-row">
          <label for="tts-toggle">Speak Words</label>
          <input type="checkbox" id="tts-toggle" checked />
        </div>
        <div class="setting-row">
          <label for="sfx-toggle">Sound Effects</label>
          <input type="checkbox" id="sfx-toggle" checked />
        </div>
        <div class="setting-row">
          <label for="music-toggle">Music</label>
          <input type="checkbox" id="music-toggle" />
        </div>
        <div class="setting-row">
          <label for="reduce-motion">Reduce Motion</label>
          <input type="checkbox" id="reduce-motion" />
        </div>
        <div class="setting-row">
          <label for="wait-time">Wait Time (seconds)</label>
          <select id="wait-time">
            <option value="3">3</option>
            <option value="5" selected>5</option>
            <option value="10">10</option>
          </select>
        </div>
        <div class="setting-row">
          <label for="difficulty">Difficulty</label>
          <select id="difficulty">
            <option value="easy">Easy</option>
            <option value="adaptive" selected>Adaptive</option>
            <option value="hard">Hard</option>
          </select>
        </div>
        <button id="close-settings" class="btn-primary">Done</button>
      </div>
    </div>
  </div>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
